$font = Iosevka Medium
$bg0 = rgb(1d2021)
$bg1 = rgb(282828)
$bg3 = rgb(45403d)
$fg = rgb(d4be98)
$red = rgb(ea6962)
$aqua = rgb(89b482)
$blue = rgb(7daea3)
$grey1 = rgb(928374)
$grey2 = rgb(7c6f64)

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 3, easeOutQuint
    animation = fadeOut, 1, 2, easeOutQuint
    animation = inputFieldDots, 1, 2, easeOutQuint
}

# Use the current desktop as a subdued Gruvbox Material backdrop.
background {
    monitor =
    path = screenshot
    blur_size = 8
    blur_passes = 4
    noise = 0.02
    contrast = 0.9
    brightness = 0.55
    vibrancy = 0.12
    vibrancy_darkness = 0.2
}

label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 64
    font_family = $font
    position = 0, 105
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $grey1
    font_size = 15
    font_family = $font
    position = 0, 52
    halign = center
    valign = center
}

label {
    monitor =
    text = <b>Locked</b>
    color = $blue
    font_size = 14
    font_family = $font
    position = 0, -16
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 350, 58
    outline_thickness = 2
    inner_color = $bg1
    outer_color = $bg3
    check_color = $aqua
    fail_color = $red
    font_color = $fg
    fade_on_empty = false
    dots_rounding = 100

    font_family = $font
    placeholder_text = Password
    fail_text = <i>$PAMFAIL</i>
    dots_center = true
    position = 0, -82
    halign = center
    valign = center
}

label {
    monitor =
    text = Esc clears input
    color = $grey2
    font_size = 12
    font_family = $font
    position = 0, -138
    halign = center
    valign = center
}
