$font = Iosevka Medium

$bg0 = rgb(1d2021)
$bg1 = rgb(282828)
$bg3 = rgb(45403d)

$fg = rgb(d4be98)
$red = rgb(ea6962)
$aqua = rgb(89b482)
$blue = rgb(7daea3)
$grey1 = rgb(928374)
$grey2 = rgb(7c6f64)

general {
    hide_cursor = true
}

animations {
    enabled = true

    bezier = cumulus, 0.16, 1, 0.30, 1

    animation = fadeIn, 1, 4, cumulus
    animation = fadeOut, 1, 3, cumulus
    animation = inputFieldDots, 1, 3, cumulus
}

background {
    monitor =
    path = screenshot

    blur_size = 10
    blur_passes = 5

    noise = 0.01
    contrast = 1.05
    brightness = 0.42
    vibrancy = 0.18
    vibrancy_darkness = 0.30
}

# Avatar (expects ~/.face to exist)
image {
    monitor =
    path = ~/.face

    size = 120
    rounding = -1

    border_size = 3
    border_color = $blue

    position = 0, 245
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 74
    font_family = $font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $grey1
    font_size = 16
    font_family = $font
    position = 0, 35
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] bash -c 'h=$(date +%H); if [ "$h" -lt 12 ]; then echo "Good Morning"; elif [ "$h" -lt 18 ]; then echo "Good Afternoon"; elif [ "$h" -lt 22 ]; then echo "Good Evening"; else echo "Good Night"; fi'
    color = $blue
    font_size = 18
    font_family = $font
    position = 0, -20
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 390, 60

    outline_thickness = 3
    rounding = 18
    dots_rounding = 100

    inner_color = $bg1
    outer_color = $blue

    check_color = $aqua
    fail_color = $red

    font_color = $fg
    font_family = $font

    placeholder_text = Enter Password
    fail_text = <i>$PAMFAIL</i>

    fade_on_empty = false
    dots_center = true

    position = 0, -95
    halign = center
    valign = center
}

label {
    monitor =
    text = Esc clears input
    color = $grey2
    font_size = 12
    font_family = $font
    position = 0, -155
    halign = center
    valign = center
}